<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <title>Gestor Financeiro - Login</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>

    <style>
        /* Modo Dark */
        body {
            background-color: #121212;
            color: #e0e0e0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background-color: #1e1e1e;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.8);
            max-width: 400px;
            width: 100%;
            text-align: center;
        }

        h2 {
            color: #ffffff;
            margin-bottom: 5px;
        }

        p {
            color: #a0a0a0;
            font-size: 0.9em;
            margin-bottom: 25px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background-color: #2c2c2c;
            color: #ffffff;
            border: 1px solid #444;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 16px;
        }

            input:focus {
                border-color: #4CAF50;
                outline: none;
            }

        /* Layout do Telefone */
        .phone-container {
            display: flex;
            gap: 10px;
            align-items: center;
        }

            .phone-container input[readonly] {
                width: 70px;
                text-align: center;
                background-color: #333;
                color: #888;
                cursor: not-allowed;
                font-weight: bold;
            }

            .phone-container input:not([readonly]) {
                flex: 1;
            }

        /* Avisos */
        .aviso {
            background-color: #332b00;
            color: #ffcc00;
            padding: 10px;
            border-radius: 6px;
            font-size: 0.85em;
            text-align: left;
            margin-bottom: 20px;
            border-left: 4px solid #ffcc00;
        }

        .aviso-critico {
            background-color: #4a1919;
            color: #ff6666;
            border-left: 4px solid #ff4444;
            padding: 15px;
            border-radius: 6px;
            margin: 20px 0;
            font-size: 0.9em;
        }

        /* Botões e Telas */
        .hidden {
            display: none !important;
        }

        .btn-whatsapp {
            background-color: #25D366;
            color: white;
            font-weight: bold;
            text-decoration: none;
            display: block;
            padding: 14px;
            border-radius: 6px;
            margin-top: 20px;
            transition: background-color 0.3s;
            font-size: 1.1em;
        }

            .btn-whatsapp:hover {
                background-color: #1ebe58;
            }

        .google-wrapper {
            display: flex;
            justify-content: center;
            margin-top: 15px;
        }
    </style>
</head>
<body style="font-family: Arial, sans-serif; text-align: center; margin-top: 100px;">

    <h2>Gestor Financeiro WPP 💸</h2>
    <p>Coloca o teu número de WhatsApp e faz login com o Google</p>

    <input type="text" id="numeroWhatsapp" placeholder="+5511999999999"
           style="padding: 10px; font-size: 16px; margin-bottom: 20px; width: 200px;">

    <br>

    <div id="g_id_onload"
         data-client_id="647379081050-rkudk52lcars6b2najlan3h25n4ss9o4.apps.googleusercontent.com"
         data-context="signin"
         data-ux_mode="popup"
         data-callback="lidarComRespostaGoogle"
         data-auto_prompt="false">
    </div>

    <div class="g_id_signin" data-type="standard" style="display: flex; justify-content: center;"></div>

    <script>
        async function lidarComRespostaGoogle(response) {
            const numero = document.getElementById('numeroWhatsapp').value;

            if (!numero) {
                alert("Calma aí, apressado! Digita o teu número do WhatsApp primeiro.");
                return;
            }

            console.log("A enviar dados para a API C#...");

            // Token do Google e o número para o nosso back-end
            const respostaApi = await fetch('/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    googleToken: response.credential,
                    telefone: numero
                })
            });

            if (respostaApi.ok) {
                alert("Sucesso! O C# recebeu os dados.");
            } else {
                alert("Ops, deu raia. O back-end recusou a encomenda.");
            }
        }
    </script>

</body>
</html>
